<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed's Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
    background:linear-gradient(
        135deg,
        #faf5ff,
        #f3e8ff,
        #e9d5ff
    );
}

/* عناصر الخلفية */

.bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
}

.bg span{
    position:absolute;
    bottom:-100px;
    animation:floatUp linear infinite;
    opacity:.5;
    font-size:1rem;
}

.bg span:nth-child(1){left:5%;animation-duration:12s;}
.bg span:nth-child(2){left:15%;animation-duration:16s;}
.bg span:nth-child(3){left:25%;animation-duration:13s;}
.bg span:nth-child(4){left:35%;animation-duration:18s;}
.bg span:nth-child(5){left:50%;animation-duration:14s;}
.bg span:nth-child(6){left:65%;animation-duration:17s;}
.bg span:nth-child(7){left:75%;animation-duration:12s;}
.bg span:nth-child(8){left:85%;animation-duration:19s;}
.bg span:nth-child(9){left:95%;animation-duration:15s;}

@keyframes floatUp{

    0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }

    20%{
        opacity:.5;
    }

    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

/* المحتوى */

.container{
    width:min(92%,500px);
    text-align:center;
    position:relative;
    z-index:2;
}

.quiz-card{
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(12px);
    padding:35px;
    border-radius:30px;
    box-shadow:0 10px 35px rgba(157,78,221,.15);
}

h1{
    color:#7e22ce;
    margin-bottom:12px;
    font-size:2rem;
}

.subtitle{
    color:#8b5cf6;
    margin-bottom:35px;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn{
    border:none;
    padding:16px;
    border-radius:18px;
    cursor:pointer;
    font-size:1.1rem;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

.wrong{
    background:#ffffff;
    color:#6b21a8;
}

.correct{
    background:#8b5cf6;
    color:white;
}

/* Popup */

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.35);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup-content{
    background:white;
    width:90%;
    max-width:340px;
    border-radius:25px;
    padding:25px;
    text-align:center;
    animation:pop .3s ease;
}

@keyframes pop{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.emoji{
    font-size:3rem;
}

.popup h2{
    color:#dc2626;
    margin:10px 0;
}

.popup p{
    color:#6b7280;
    margin-top:10px;
}

.close-btn{
    margin-top:20px;
    border:none;
    background:#8b5cf6;
    color:white;
    padding:12px 25px;
    border-radius:15px;
    cursor:pointer;
}

</style>
</head>
<body>

<!-- الخلفية -->

<div class="bg">
    <span>💜</span>
    <span>🌸</span>
    <span>💜</span>
    <span>🌷</span>
    <span>🤍</span>
    <span>🌸</span>
    <span>💜</span>
    <span>✨</span>
    <span>🌷</span>
</div>

<!-- الكويز -->

<div class="container">

    <div class="quiz-card">

        <h1>ايه اكتر حاجه بتحبها؟ 💜</h1>

        <p class="subtitle">
ركز هااا        </p>

        <div class="answers">

            <button class="btn wrong">
                ميسي
            </button>

            <button class="btn correct"
            onclick="window.location.href='final.html'">
                أنا
            </button>

            <button class="btn wrong">
                صنية الفراخ بالبطاطس
            </button>

        </div>

    </div>

</div>

<!-- Popup -->

<div class="popup" id="popup">

    <div class="popup-content">

        <div class="emoji">😠</div>

        <h2>غلط!</h2>

        <p>
            عدي ليلتك<br>
        </p>

        <button class="close-btn" onclick="closePopup()">
            حاول تاني
        </button>

    </div>

</div>

<script>

const popup = document.getElementById("popup");

document.querySelectorAll(".wrong").forEach(btn => {

    btn.addEventListener("click", () => {

        popup.style.display = "flex";

    });

});

function closePopup(){

    popup.style.display = "none";

}

</script>

</body>
</html>
